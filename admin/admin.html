<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A&M Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<header>
  <div class="logo">
    A&M Infinity Bites
    <span>Admin Panel</span>
  </div>
  <div id="loginStatus">
    <span id="adminName"></span>
    <button id="logoutBtn" style="display:none">Logout</button>
  </div>
</header>

<!-- LOGIN SCREEN -->
<div class="container" id="loginScreen">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Login to manage your store</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="loginBtn">Login</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="container" id="adminPanel">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-subtitle">Manage your products and track orders</p>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-number" id="totalProducts">0</div>
      <div class="stat-label">Total Products</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="totalOrders">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="pendingOrders">0</div>
      <div class="stat-label">Pending Orders</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="totalRevenue">₦0</div>
      <div class="stat-label">Revenue</div>
    </div>
  </div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <button class="main-tab active" id="productsTab">Products</button>
    <button class="main-tab" id="ordersTab">Orders</button>
  </div>

  <!-- PRODUCTS VIEW -->
  <div id="productsView">
    <div class="grid">
      <!-- ADD PRODUCT FORM -->
      <div class="form-card">
        <h3>Add New Product</h3>
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prodName" placeholder="e.g. Orange" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (₦)</label>
            <input type="number" id="prodPrice" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="prodCategory">
              <option value="Greek Yogurt Fruit Parfait">Greek Yogurt Fruit Parfait</option>
              <option value="Fruit Salad Mix">Fruit Salad Mix</option>
              <option value="Fruit Smoothie">Fruit Smoothie</option>
              <option value="Fruit Juice">Fruit Juice</option>
              <option value="Tasty Yogurt">Tasty Yogurt</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prodDesc" placeholder="Short description..."></textarea>
        </div>
        <div class="form-group">
          <label>Image URL or Path</label>
          <input type="text" id="prodImage" placeholder="images/orange.jpg" />
        </div>
        <button class="btn btn-primary" id="addProductBtn">Add Product</button>
        <div class="msg" id="addMsg"></div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="products-panel">
        <h3>All Products</h3>
        <div id="productsList"></div>
      </div>
    </div>
  </div>

  <!-- ORDERS VIEW -->
  <div id="ordersView" style="display:none;">
    <div class="orders-panel">
      <h3>All Orders</h3>
      <div id="ordersList"></div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Edit Product</h3>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="editName" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (₦)</label>
        <input type="number" id="editPrice" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="editCategory">
          <option value="Greek Yogurt Fruit Parfait">Greek Yogurt Fruit Parfait</option>
          <option value="Fruit Salad Mix">Fruit Salad Mix</option>
          <option value="Fruit Smoothie">Fruit Smoothie</option>
          <option value="Fruit Juice">Fruit Juice</option>
          <option value="Tasty Yogurt">Tasty Yogurt</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="editDesc"></textarea>
    </div>
    <div class="form-group">
      <label>Image URL or Path</label>
      <input type="text" id="editImage" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
      <button class="btn-save" id="saveEditBtn">Save Changes</button>
    </div>
    <div class="msg" id="editMsg"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
